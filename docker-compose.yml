services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-imc_ipm}
      POSTGRES_USER: ${POSTGRES_USER:-imc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-imc_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.9.7
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-imc}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-imc_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://imc:imc_password@postgres:5432/imc_ipm}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      STORAGE_DIR: /data/uploads
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/data/uploads
    depends_on:
      - postgres
      - qdrant

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  upload_data:
