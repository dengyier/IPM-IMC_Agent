# ============================================================================
# IMC&IPM 商业决策智能体 —— 全栈一键部署编排 (直连 + SQLite 宿主机持久化版)
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-imc_ipm}
      POSTGRES_USER: ${POSTGRES_USER:-imc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-imc_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-imc} -d ${POSTGRES_DB:-imc_ipm}"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      # 强制指定为容器内 data 目录下的 SQLite 数据库
      DATABASE_URL: sqlite:///./data/imc_ipm.db
      QDRANT_URL: http://qdrant:6333
      STORAGE_DIR: /data/uploads
    volumes:
      - upload_data:/data/uploads
      # 【核心修改】将宿主机目录挂载到容器内的 data 目录
      # 注意：如果 后端 Dockerfile 中的 WORKDIR 不是 /app（例如是 /code 或 /workspace），请将下方 /app/data 替换为对应的 /code/data
      - /opt/imc-migration:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:18005/').status==200 else sys.exit(1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "18005:18005"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${PUBLIC_BASE_URL:-http://8.217.223.92:18005}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "13005:13005"

volumes:
  postgres_data:
  qdrant_data:
  upload_data: