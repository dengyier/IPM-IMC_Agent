# IMC&IPM 反向代理（容器内 nginx 使用）
# /api、/docs、/openapi.json → 后端 api:18005
# 其余 → 前端 frontend:13005
# 配好证书后，复制本块为 listen 443 ssl 的 server 并填写证书路径即可启用 HTTPS。

server {
    listen 80;
    server_name _;

    # 上传课件/资料可能较大
    client_max_body_size 200m;

    location /api/ {
        proxy_pass http://api:18005/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # DeepSeek 生成较慢，放宽超时（后端客户端为 90s）
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location = /docs        { proxy_pass http://api:18005/docs;         proxy_set_header Host $host; }
    location = /openapi.json { proxy_pass http://api:18005/openapi.json; proxy_set_header Host $host; }

    location / {
        proxy_pass http://frontend:13005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
